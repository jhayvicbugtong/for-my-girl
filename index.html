<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Favorite Person ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="heart-bg" id="hearts-container"></div>

    <div class="container">
        
        <!-- ANNIVERSARY MESSAGE -->
        <div class="anniversary-header">
            <h2>Our Anniversary 💕</h2>
            <p class="anniversary-date">March 16, 2027</p>
            <p class="anniversary-msg">The day our forever begins...</p>
        </div>

        <!-- COUNTDOWN TIMER -->
        <div class="countdown-container">
            <div class="countdown-title" id="countdown-title">⏳ Countdown to our Anniversary</div>
            <div class="timer" id="countdown">
                <div class="time-box"><div id="days">00</div><span>Days</span></div>
                <div class="time-box"><div id="hours">00</div><span>Hrs</span></div>
                <div class="time-box"><div id="minutes">00</div><span>Mins</span></div>
                <div class="time-box"><div id="seconds">00</div><span>Secs</span></div>
            </div>
        </div>

        <audio id="backgroundMusic" preload="auto" src="audio/Goo Goo Dolls - Iris.mp3" style="display:none"></audio>

        <!-- REASONS I LOVE YOU -->
        <div class="love-card">
            <h1>Reasons I Love You ❤️</h1>
            <div class="reason-display" id="reason-text">
                Click the button below to reveal a reason...
            </div>
            <button class="action-btn" onclick="revealReason()">Click to Reveal ✨</button>
        </div>

        <!-- MILESTONES SECTION -->
        <div class="milestones-card">
            <h2>Our Milestones 🎉</h2>
            <div class="milestones-list" id="milestones-list"></div>
            <div class="milestone-input-group">
                <input type="text" id="milestoneDateInput" class="milestone-input" placeholder="Date (e.g. December 25, 2026)">
                <input type="text" id="milestoneDescInput" class="milestone-input" placeholder="Description (e.g. First kiss)">
            </div>
            <button class="action-btn secondary" onclick="addMilestone()">Add Milestone ➕</button>
        </div>

        <!-- REMINDER SECTION -->
        <div class="reminder-card">
            <h2>Set a Reminder 🔔</h2>
            <label class="checkbox-label">
                <input type="checkbox" id="reminderToggle" onchange="toggleReminder()">
                <span>Remind me on anniversary morning</span>
            </label>
            <p class="reminder-info" id="reminderInfo"></p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
